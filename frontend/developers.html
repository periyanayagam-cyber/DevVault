<!DOCTYPE html>
<html>

<head>

    <title>Developers - DevVault</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="logo">⚡ DevVault</div>

        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="profile.html">👤 Profile</a>
        <a href="developers.html" class="active">👨‍💻 Developers</a>
        <a href="leaderboard.html">🏆 Leaderboard</a>
        <a href="trending.html">🔥 Trending</a>

    </div>

    <!-- Main -->
    <div class="main-content">

    <h1 class="page-title">
        👨‍💻 Developers
    </h1>

    <div id="developerList"></div>

</div>

    <div class="right-panel">

    <div class="profile-card">

        <img
            id="profileAvatar"
            class="profile-avatar"
            src="developer.png"
            alt="Profile">

        <h3 id="profileName">Developer</h3>

        <p>DevVault Member</p>

    </div>

    <div class="stat-box">
        <h4>Rank</h4>
        <p id="userRank">#1</p>
    </div>

    <div class="stat-box">
        <h4>Snippets</h4>
        <p id="sideSnippets">0</p>
    </div>

    <div class="stat-box">
        <h4>Likes</h4>
        <p id="sideLikes">0</p>
    </div>

</div>

    <script>
    if(!localStorage.getItem("username")){
        window.location.href="login.html";
    }
    </script>
    <script src="script.js"></script>
    <script src="developers.js"></script>

</body>

</html>
